<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSG Map Compiler</title>
    <link rel="icon" href="/favicon.svg" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #111; color: #eee; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        main { max-width: 800px; width: 100%; padding: 2rem 1rem; }
        header { text-align: center; margin-bottom: 2rem; }
        header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        header p { color: #999; }
        code { background: #222; padding: 0.15em 0.4em; border-radius: 3px; font-size: 0.9em; }
        .drop-zone { border: 2px dashed #444; border-radius: 8px; padding: 3rem 2rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
        .drop-zone--active { border-color: #4af; background: rgba(68,170,255,0.05); }
        .drop-zone p { margin-bottom: 0.5rem; color: #888; }
        .file-label { color: #4af; cursor: pointer; text-decoration: underline; }
        #file-input { display: none; }
        .status { margin-top: 1.5rem; text-align: center; }
        .progress-bar { height: 4px; background: #4af; border-radius: 2px; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
        #status-text { margin-top: 0.5rem; color: #999; }
        .error { margin-top: 1.5rem; padding: 1rem; background: #3a1111; border: 1px solid #f44; border-radius: 6px; color: #f88; }
        #result { margin-top: 1.5rem; text-align: center; }
        .download-button { display: inline-block; padding: 0.6rem 1.5rem; background: #4af; color: #111; text-decoration: none; border-radius: 6px; font-weight: 600; margin-bottom: 1rem; }
        #preview-canvas { width: 100%; height: 400px; border-radius: 6px; background: #1a1a1a; display: block; }
        .result-toolbar { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .result-toolbar button { background: #222; border: 1px solid #444; color: #eee; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        .result-toolbar button.active { background: #4af; color: #111; border-color: #4af; }
        .result-content { display: flex; gap: 1rem; }
        .sidebar { width: 280px; flex-shrink: 0; max-height: 440px; overflow-y: auto; background: #1a1a1a; border-radius: 6px; padding: 0.5rem; font-size: 0.85rem; }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        .result-canvas-wrapper { flex: 1; min-width: 0; }
        .result-canvas-wrapper canvas { width: 100%; height: 400px; border-radius: 6px; background: #1a1a1a; display: block; }
        .metadata-list { display: grid; grid-template-columns: auto 1fr; gap: 0.25rem 0.75rem; }
        .metadata-list dt { color: #999; }
        .metadata-list dd { color: #eee; text-align: right; }
        .bvh-node { cursor: pointer; padding: 2px 4px; border-radius: 3px; white-space: nowrap; }
        .bvh-node:hover { background: #333; }
        .bvh-selected { background: #2a4a6a !important; }
        .bvh-toggle { display: inline-block; width: 1em; text-align: center; cursor: pointer; user-select: none; }
        .bvh-icon { margin-right: 0.25rem; }
        .bvh-label { color: #ccc; }
    </style>
</head>
<body>
    <main id="app">
        <header>
            <h1>CSG Map Compiler</h1>
            <p>Drop a <code>.map</code> file to convert it to <code>.glb</code></p>
        </header>

        <div id="drop-zone" class="drop-zone" role="button" tabindex="0">
            <p>Drag &amp; drop a .map file here</p>
            <label for="file-input" class="file-label">or choose a file</label>
            <input type="file" id="file-input" accept=".map" />
        </div>

        <div id="status" class="status" hidden aria-live="polite">
            <div id="progress" class="progress-bar"></div>
            <p id="status-text"></p>
        </div>

        <div id="error" class="error" hidden aria-live="polite"></div>

        <div id="result" hidden>
            <div class="result-toolbar">
                <a id="download-link" class="download-button">Download .glb</a>
                <button id="toggle-bvh-tree" title="Toggle BVH Tree">🌳 BVH</button>
                <button id="toggle-metadata" title="Toggle Metadata">📊 Stats</button>
            </div>
            <div class="result-content">
                <aside id="bvh-tree-panel" class="sidebar" hidden></aside>
                <div class="result-canvas-wrapper">
                    <canvas id="preview-canvas" aria-label="3D preview of compiled model"></canvas>
                </div>
                <aside id="metadata-panel" class="sidebar" hidden></aside>
            </div>
        </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
